{% extends "base.html" %}

{% block title %}Check URL - PhishGuard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="text-center mb-4"><i class="fas fa-search"></i> Check URL for Phishing</h2>
            <form method="POST">
                <div class="mb-3">
                    <label for="url" class="form-label">Enter URL</label>
                    <input type="url" class="form-control form-control-lg" id="url" name="url" placeholder="https://example.com" required>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5"><i class="fas fa-check"></i> Check URL</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
